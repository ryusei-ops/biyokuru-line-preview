<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Biyokuru LINE配信プレビュー</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #e8e8e8;
    font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 40px;
    min-height: 100vh;
  }

  /* --- Controls --- */
  .controls {
    display: flex;
    gap: 12px;
    margin-bottom: 20px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .seg-btn {
    padding: 10px 24px;
    border: 2px solid #06c755;
    border-radius: 24px;
    background: #fff;
    color: #06c755;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all .2s;
  }
  .seg-btn.active {
    background: #06c755;
    color: #fff;
  }
  .reset-btn {
    padding: 10px 24px;
    border: 2px solid #999;
    border-radius: 24px;
    background: #fff;
    color: #666;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all .2s;
  }
  .reset-btn:hover { background: #f0f0f0; }

  /* --- Phone Frame --- */
  .phone {
    width: 375px;
    max-width: 100%;
    background: #fff;
    border-radius: 40px;
    box-shadow: 0 20px 60px rgba(0,0,0,.15), 0 0 0 1px rgba(0,0,0,.05);
    overflow: hidden;
    position: relative;
  }

  /* Status bar */
  .status-bar {
    height: 50px;
    background: #06c755;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    padding-bottom: 8px;
  }
  .status-bar span {
    color: #fff;
    font-size: 11px;
    font-weight: 600;
  }

  /* LINE header */
  .line-header {
    background: #06c755;
    padding: 10px 16px 14px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .line-header .back {
    color: #fff;
    font-size: 22px;
    line-height: 1;
  }
  .line-header .avatar-header {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 700;
    color: #06c755;
    flex-shrink: 0;
  }
  .line-header .name {
    color: #fff;
    font-size: 16px;
    font-weight: 600;
  }

  /* Chat area */
  .chat {
    background: #7494c0;
    min-height: 520px;
    max-height: 520px;
    overflow-y: auto;
    padding: 16px 12px;
    scroll-behavior: smooth;
  }

  /* Date label */
  .date-label {
    text-align: center;
    margin-bottom: 16px;
  }
  .date-label span {
    background: rgba(0,0,0,.25);
    color: #fff;
    font-size: 11px;
    padding: 3px 12px;
    border-radius: 12px;
  }

  /* Message row */
  .msg-row {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    margin-bottom: 8px;
    animation: fadeIn .35s ease;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg-row.bot { justify-content: flex-start; }
  .msg-row.user { justify-content: flex-end; }

  .avatar {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
    color: #06c755;
    flex-shrink: 0;
    align-self: flex-start;
  }

  .bubble {
    max-width: 260px;
    padding: 10px 14px;
    border-radius: 18px;
    font-size: 14px;
    line-height: 1.65;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .bot .bubble {
    background: #fff;
    color: #111;
    border-bottom-left-radius: 4px;
  }
  .user .bubble {
    background: #06c755;
    color: #fff;
    border-bottom-right-radius: 4px;
  }

  .time {
    font-size: 10px;
    color: rgba(255,255,255,.7);
    flex-shrink: 0;
    align-self: flex-end;
    margin-bottom: 2px;
  }
  .msg-row.user .time { order: -1; }

  /* Quick reply buttons */
  .quick-replies {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin: 8px 0 8px 44px;
    animation: fadeIn .35s ease;
  }
  .qr-btn {
    background: #fff;
    border: 1.5px solid #06c755;
    border-radius: 20px;
    padding: 10px 20px;
    font-size: 14px;
    color: #06c755;
    font-weight: 600;
    cursor: pointer;
    transition: all .15s;
    max-width: 260px;
    text-align: center;
  }
  .qr-btn:hover {
    background: #06c755;
    color: #fff;
  }
  .qr-btn:active {
    transform: scale(.96);
  }
  .qr-btn.disabled {
    pointer-events: none;
    opacity: .4;
  }

  /* CTA button in bot message */
  .cta-wrap {
    margin: 8px 0 8px 44px;
    animation: fadeIn .35s ease;
  }
  .cta-btn {
    display: block;
    background: #06c755;
    color: #fff;
    border: none;
    border-radius: 20px;
    padding: 12px 24px;
    font-size: 14px;
    font-weight: 600;
    text-decoration: none;
    text-align: center;
    max-width: 260px;
    cursor: pointer;
    transition: all .15s;
  }
  .cta-btn:hover { background: #05b34c; }

  /* Typing indicator */
  .typing {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    margin-bottom: 8px;
  }
  .typing-dots {
    background: #fff;
    border-radius: 18px;
    border-bottom-left-radius: 4px;
    padding: 12px 18px;
    display: flex;
    gap: 4px;
  }
  .typing-dots span {
    width: 8px;
    height: 8px;
    background: #aaa;
    border-radius: 50%;
    animation: bounce .6s infinite alternate;
  }
  .typing-dots span:nth-child(2) { animation-delay: .15s; }
  .typing-dots span:nth-child(3) { animation-delay: .3s; }
  @keyframes bounce {
    to { transform: translateY(-4px); opacity: .5; }
  }

  /* Bottom bar */
  .bottom-bar {
    background: #f7f7f7;
    border-top: 1px solid #ddd;
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .bottom-bar .input-fake {
    flex: 1;
    background: #fff;
    border: 1px solid #ddd;
    border-radius: 20px;
    padding: 8px 16px;
    font-size: 13px;
    color: #999;
  }

  /* Info panel */
  .info {
    margin-top: 20px;
    background: #fff;
    border-radius: 16px;
    padding: 20px 24px;
    max-width: 375px;
    width: 100%;
    box-shadow: 0 2px 12px rgba(0,0,0,.06);
  }
  .info h3 {
    font-size: 14px;
    color: #333;
    margin-bottom: 8px;
  }
  .info p, .info li {
    font-size: 13px;
    color: #666;
    line-height: 1.7;
  }
  .info ul { padding-left: 18px; margin-top: 4px; }

  /* Segment label */
  .seg-label {
    text-align: center;
    margin-bottom: 12px;
    font-size: 13px;
    color: #666;
    font-weight: 600;
  }
  .seg-label strong {
    color: #06c755;
  }
</style>
</head>
<body>

<div class="controls">
  <button class="seg-btn active" onclick="switchSegment('A')">Seg A: 60〜99日</button>
  <button class="seg-btn" onclick="switchSegment('B')">Seg B: 100日以上</button>
  <button class="reset-btn" onclick="resetChat()">リセット</button>
</div>

<div class="seg-label">現在表示: <strong id="seg-display">セグメントA（離脱60〜99日）</strong></div>

<div class="phone">
  <div class="status-bar"><span>12:15</span></div>
  <div class="line-header">
    <span class="back">&lsaquo;</span>
    <div class="avatar-header">B</div>
    <span class="name">Biyokuru</span>
  </div>
  <div class="chat" id="chat"></div>
  <div class="bottom-bar">
    <div class="input-fake">Aa</div>
  </div>
</div>

<div class="info">
  <h3>操作方法</h3>
  <ul>
    <li>上部のボタンでセグメントA/Bを切替</li>
    <li>質問パネルのボタンをタップで2通目を確認</li>
    <li>「リセット」で最初から再生</li>
  </ul>
  <h3 style="margin-top:12px">遷移先URL</h3>
  <ul>
    <li>再診LP: liff.line.me/...reservations</li>
    <li>EC: biyokuru-ec.square.site</li>
  </ul>
</div>

<script>
const DATA = {
  A: {
    msg1: `こんにちは、Biyokuruです。

前回の受診から少しお時間が
空きましたが、
あのときの体重、
維持できていますか？

今の状況に近いものを
タップしてください。`
  },
  B: {
    msg1: `お久しぶりです、Biyokuruです。

ダイエットを一度お休みしてから
しばらく経ちましたが、
今の体重に納得できていますか？

今の状況に近いものを
タップしてください。`
  },
  replies: {
    maintain: {
      user: '維持できてる',
      bot: `素晴らしいです！
キープできていますね。

実はBiyokuruでは、
オンラインで本格的な
美容アイテムもご購入いただけます。

内側・外側からのケアで、
今のコンディションを
もっときれいに残しませんか？

今後もぜひ、Biyokuruを
よろしくお願いいたします。`,
      cta: '美容アイテムを見る',
      url: 'https://biyokuru-ec.square.site/'
    },
    slight: {
      user: '少し戻ってきた',
      bot: `そうでしたか、！
元に戻さないためには、早めの再開がいちばん楽です。

前回のカルテを引き継ぐので、
改めての問診は不要。

スマホで3分、
通院なしで再診できます。
質問だけでも大丈夫です。

お気軽にBiyokuruをご利用ください。`,
      cta: '3分で再診を予約する',
      url: 'https://liff.line.me/2004848501-V0w3z9Gx?clinic_path=bs9dn4im&page=reservations'
    },
    heavy: {
      user: 'だいぶ戻ってしまった',
      bot: `そうなんですね
また痩せたいという時は
是非もう一度Biyokuruをご検討ください。

前回の経過を引き継いで
再スタートできるので、
ゼロからやり直す必要は
ありません。

スマホで3分、
通院なしで再診できます。

お気軽にご相談ください。`,
      cta: '3分で再診を予約する',
      url: 'https://liff.line.me/2004848501-V0w3z9Gx?clinic_path=bs9dn4im&page=reservations'
    }
  }
};

let currentSeg = 'A';
let answered = false;

function switchSegment(seg) {
  currentSeg = seg;
  document.querySelectorAll('.seg-btn').forEach((b, i) => {
    b.classList.toggle('active', (i === 0 && seg === 'A') || (i === 1 && seg === 'B'));
  });
  document.getElementById('seg-display').innerHTML =
    seg === 'A' ? 'セグメントA（離脱60〜99日）' : 'セグメントB（離脱100日以上）';
  resetChat();
}

function resetChat() {
  answered = false;
  const chat = document.getElementById('chat');
  chat.innerHTML = '';
  showInitial();
}

function showInitial() {
  const chat = document.getElementById('chat');

  // Date label
  const dl = document.createElement('div');
  dl.className = 'date-label';
  dl.innerHTML = '<span>4/17 (木)</span>';
  chat.appendChild(dl);

  // Bot message 1
  setTimeout(() => {
    addBotMessage(DATA[currentSeg].msg1, '12:15');

    // Quick reply buttons
    setTimeout(() => {
      const qr = document.createElement('div');
      qr.className = 'quick-replies';
      qr.id = 'qr-panel';

      const btns = [
        { key: 'maintain', label: '維持できてる' },
        { key: 'slight', label: '少し戻ってきた' },
        { key: 'heavy', label: 'だいぶ戻ってしまった' }
      ];

      btns.forEach(b => {
        const btn = document.createElement('button');
        btn.className = 'qr-btn';
        btn.textContent = b.label;
        btn.onclick = () => handleReply(b.key);
        qr.appendChild(btn);
      });

      chat.appendChild(qr);
      chat.scrollTop = chat.scrollHeight;
    }, 300);
  }, 400);
}

function handleReply(key) {
  if (answered) return;
  answered = true;

  const reply = DATA.replies[key];
  const chat = document.getElementById('chat');

  // Disable buttons
  document.querySelectorAll('.qr-btn').forEach(b => b.classList.add('disabled'));

  // User message
  addUserMessage(reply.user, '12:15');

  // Typing indicator
  setTimeout(() => {
    const typing = document.createElement('div');
    typing.className = 'typing';
    typing.id = 'typing';
    typing.innerHTML = `
      <div class="avatar">B</div>
      <div class="typing-dots"><span></span><span></span><span></span></div>
    `;
    chat.appendChild(typing);
    chat.scrollTop = chat.scrollHeight;

    // Bot reply
    setTimeout(() => {
      typing.remove();
      addBotMessage(reply.bot, '12:15');

      // CTA button
      setTimeout(() => {
        const wrap = document.createElement('div');
        wrap.className = 'cta-wrap';
        const a = document.createElement('a');
        a.className = 'cta-btn';
        a.href = reply.url;
        a.target = '_blank';
        a.rel = 'noopener';
        a.textContent = reply.cta + ' ▶';
        wrap.appendChild(a);
        chat.appendChild(wrap);
        chat.scrollTop = chat.scrollHeight;
      }, 200);
    }, 1200);
  }, 500);
}

function addBotMessage(text, time) {
  const chat = document.getElementById('chat');
  const row = document.createElement('div');
  row.className = 'msg-row bot';
  row.innerHTML = `
    <div class="avatar">B</div>
    <div class="bubble">${escapeHtml(text)}</div>
    <span class="time">${time}</span>
  `;
  chat.appendChild(row);
  chat.scrollTop = chat.scrollHeight;
}

function addUserMessage(text, time) {
  const chat = document.getElementById('chat');
  const row = document.createElement('div');
  row.className = 'msg-row user';
  row.innerHTML = `
    <span class="time">${time}</span>
    <div class="bubble">${escapeHtml(text)}</div>
  `;
  chat.appendChild(row);
  chat.scrollTop = chat.scrollHeight;
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

// Init
showInitial();
</script>
</body>
</html>
